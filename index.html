/* Diagnóstico temprano: corre en JS normal (no Babel).
   Si algo falla antes de React, mostramos un reporte en pantalla. */
window.addEventListener("DOMContentLoaded", function () {
  setTimeout(function () {
    var root = document.getElementById("root");
    if (root && root.children.length > 0) return; // React ya renderizó, todo ok

    var problemas = [];
    if (location.protocol === "file:") problemas.push("Estás abriendo el archivo con doble clic (file://). Tenés que abrirlo desde una URL http, por ejemplo GitHub Pages. Así no va a funcionar.");
    if (typeof window.React === "undefined") problemas.push("No cargó React (revisá tu conexión o si un bloqueador está frenando los CDN).");
    if (typeof window.ReactDOM === "undefined") problemas.push("No cargó ReactDOM.");
    if (typeof window.Babel === "undefined") problemas.push("No cargó Babel.");
    if (typeof window.supabase === "undefined") problemas.push("No cargó la librería de Supabase.");
    if (typeof window.sha256 === "undefined") problemas.push("No cargó la librería sha256.");
    if (typeof window.XLSX === "undefined") problemas.push("No cargó la librería XLSX.");

    if (problemas.length === 0) problemas.push("Las librerías cargaron pero React no renderizó. Abrí F12 -> Console y fijate el error en rojo.");

    root.innerHTML =
      '<div style="max-width:600px;margin:60px auto;padding:24px;font-family:sans-serif;background:#fff;border:1px solid #eee;border-radius:12px">' +
      '<h2 style="color:#dc2626;margin-top:0">Diagnóstico</h2>' +
      '<ul style="color:#334155;line-height:1.6">' +
      problemas.map(function (p) { return "<li>" + p + "</li>"; }).join("") +
      '</ul></div>';
  }, 2500);
});
</script>

/* ============ HELPERS ============ */
async function hashPassword(plain) {
  const enc = new TextEncoder().encode(plain + '::intagro_salt_v1');
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf)).map((b) => b.toString(16).padStart(2, '0')).join('');
}

function formatMonto(num) {
  const n = Number(num || 0);
  return "$" + n.toLocaleString("es-AR", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function parseMontoDigits(raw) {
  const digits = (raw || "").replace(/\D/g, "");
  if (!digits) return 0;
  return parseInt(digits, 10) / 100;
}

function formatMontoDisplay(num) {
  const n = Number(num || 0);
  return n.toLocaleString("es-AR", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function formatFechaHora(iso) {
  if (!iso) return "-";
  const d = new Date(iso);
  return d.toLocaleDateString("es-AR") + " " + d.toLocaleTimeString("es-AR", { hour: "2-digit", minute: "2-digit", hour12: false }) + "hs";
}

function formatFecha(iso) {
  if (!iso) return "-";
  const d = new Date(iso + "T00:00:00");
  return d.toLocaleDateString("es-AR");
}

// Muestra saldo de cuenta corriente: positivo (a favor) verde, negativo (deudor) rojo
function SaldoCC({ saldo }) {
  const n = Number(saldo || 0);
  const color = n < 0 ? "text-rose-600" : (n > 0 ? "text-emerald-600" : "text-slate-500");
  const signo = n < 0 ? "-" : "";
  return <span className={"font-semibold " + color}>{signo}{formatMonto(Math.abs(n))}</span>;
}

const CONCEPTO_LABEL = { saldo_cuenta: "Saldo en cuenta", cobro_dia: "Cobro del día", anticipo: "Anticipo" };

// Etiqueta de tipo: cheque azul, transferencia violeta
function TipoTag({ tipo, tipoCheque }) {
  const esCheque = tipo === "cheque";
  const cls = esCheque ? "bg-blue-100 text-blue-700" : "bg-violet-100 text-violet-700";
  const label = esCheque ? (tipoCheque === "electronico" ? "E-cheq" : "Ch. papel") : "Transfer.";
  return <span className={"inline-block px-1.5 py-0 rounded text-[10px] font-semibold leading-4 " + cls}>{label}</span>;
}

// Etiqueta de concepto: cobro del día / saldo en cuenta verde tenue, anticipo rojo claro
function ConceptoTag({ concepto }) {
  if (!concepto) return null;
  const esAnticipo = concepto === "anticipo";
  const cls = esAnticipo ? "bg-rose-50 text-rose-600" : "bg-emerald-50 text-emerald-600";
  const short = { saldo_cuenta: "Saldo cta.", cobro_dia: "Cobro día", anticipo: "Anticipo" };
  return <span className={"inline-block px-1.5 py-0 rounded text-[10px] font-medium leading-4 " + cls}>{short[concepto] || concepto}</span>;
}

function todayISO() {
  return new Date().toISOString();
}

function uid() {
  return Math.random().toString(36).slice(2, 10);
}

const ESTADO_STYLES = {
  solicitado: "bg-amber-100 text-amber-800 border border-amber-300",
  confirmado: "bg-emerald-100 text-emerald-800 border border-emerald-300",
  rechazado: "bg-rose-100 text-rose-800 border border-rose-300",
  anulado: "bg-slate-200 text-slate-600 border border-slate-300",
};

function EstadoBadge({ estado }) {
  return (
    <span className={"px-1.5 py-0 rounded-full text-[10px] font-semibold leading-4 " + (ESTADO_STYLES[estado] || "")}>
      {estado.toUpperCase()}
    </span>
  );
}

/* Input de moneda enmascarado: guarda un numero, muestra formateado */
function CurrencyInput({ value, onChange, placeholder }) {
  const [display, setDisplay] = useState(value ? formatMontoDisplay(value) : "");
  useEffect(() => {
    setDisplay(value ? formatMontoDisplay(value) : "");
  }, [value]);
  return (
    <div className="relative">
      <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm">$</span>
      <input
        type="text"
        inputMode="numeric"
        value={display}
        placeholder={placeholder || "0,00"}
        onChange={(e) => {
          const num = parseMontoDigits(e.target.value);
          setDisplay(formatMontoDisplay(num));
          onChange(num);
        }}
        className="w-full pl-7 pr-3 py-2 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none"
      />
    </div>
  );
}

function Field({ label, children, required }) {
  return (
    <div className="mb-2">
      <label className="block text-xs font-semibold text-slate-600 mb-0.5">
        {label} {required && <span className="text-rose-500">*</span>}
      </label>
      {children}
    </div>
  );
}

function Button({ children, onClick, variant = "primary", disabled, className = "", type = "button" }) {
  const variants = {
    primary: "bg-emerald-600 hover:bg-emerald-700 text-white",
    secondary: "bg-slate-100 hover:bg-slate-200 text-slate-700 border border-slate-300",
    danger: "bg-rose-600 hover:bg-rose-700 text-white",
    ghost: "hover:bg-slate-100 text-slate-600",
  };
  return (
    <button
      type={type}
      disabled={disabled}
      onClick={onClick}
      className={
        "px-3 py-1.5 rounded-lg text-sm font-medium transition disabled:opacity-40 disabled:cursor-not-allowed " +
        variants[variant] + " " + className
      }
    >
      {children}
    </button>
  );
}

function Modal({ title, onClose, children, wide }) {
  return (
    <div className="fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4" onClick={onClose}>
      <div
        className={"bg-white rounded-xl shadow-xl w-full " + (wide ? "max-w-2xl" : "max-w-md") + " max-h-[90vh] overflow-y-auto"}
        onClick={(e) => e.stopPropagation()}
      >
        <div className="flex items-center justify-between px-5 py-3 border-b border-slate-200">
          <h3 className="font-semibold text-slate-800">{title}</h3>
          <button onClick={onClose} className="text-slate-400 hover:text-slate-600 text-xl leading-none">&times;</button>
        </div>
        <div className="p-5">{children}</div>
      </div>
    </div>
  );
}

function exportToExcel(rows, filename, columnasMoneda) {
  const ws = XLSX.utils.json_to_sheet(rows);
  // Formato de moneda $x.xxx.xxx,xx en las columnas indicadas (siguen siendo numéricas)
  if (columnasMoneda && columnasMoneda.length && rows.length) {
    const headers = Object.keys(rows[0]);
    const rango = XLSX.utils.decode_range(ws["!ref"]);
    columnasMoneda.forEach((nombreCol) => {
      const idx = headers.indexOf(nombreCol);
      if (idx === -1) return;
      for (let r = 1; r <= rango.e.r; r++) {
        const celda = ws[XLSX.utils.encode_cell({ c: idx, r })];
        if (celda && typeof celda.v === "number") {
          celda.t = "n";
          celda.z = '"$"#.##0,00';
        }
      }
    });
  }
  // Ancho de columnas según contenido
  if (rows.length) {
    const headers = Object.keys(rows[0]);
    ws["!cols"] = headers.map((h) => {
      const largos = rows.map((r) => String(r[h] == null ? "" : r[h]).length);
      return { wch: Math.min(40, Math.max(h.length, ...largos) + 2) };
    });
  }
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Datos");
  XLSX.writeFile(wb, filename, { cellStyles: true });
}

/* ============ LOGIN / BOOTSTRAP ============ */
function LoginScreen({ onLogin }) {
  const [username, setUsername] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");

  async function handleLogin(e) {
    e.preventDefault();
    setError("");
    const { data, error: err } = await sb
      .from("usuarios")
      .select("*")
      .ilike("username", username.trim())
      .maybeSingle();
    if (err || !data) {
      setError("Usuario no encontrado.");
      return;
    }
    if (data.password_hash !== (await hashPassword(password))) {
      setError("Contraseña incorrecta.");
      return;
    }
    if (data.activo === false) {
      setError("Usuario inactivo. Consultá con el administrador.");
      return;
    }
    // Mapear rol de logística al rol de esta app
    const rol_app = data.rol === "analista" ? "analista_finanzas" : "comercial";
    onLogin({ ...data, rol_app });
  }

  return (
    <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-100 to-slate-200 px-4">
      <div className="bg-white rounded-2xl shadow-lg w-full max-w-sm p-8">
        <div className="text-center mb-6">
          <div className="text-2xl font-bold text-emerald-700">Intagro SA</div>
          <div className="text-sm text-slate-500">Transferencias y E-cheq</div>
        </div>
        <form onSubmit={handleLogin}>
          <Field label="Usuario" required>
            <input className="w-full border border-slate-300 rounded-lg px-3 py-1.5 text-sm" value={username} onChange={(e) => setUsername(e.target.value)} autoFocus />
          </Field>
          <Field label="Contraseña" required>
            <input type="password" className="w-full border border-slate-300 rounded-lg px-3 py-1.5 text-sm" value={password} onChange={(e) => setPassword(e.target.value)} />
          </Field>
          {error && <p className="text-rose-600 text-xs mb-3">{error}</p>}
          <Button type="submit" className="w-full justify-center">Ingresar</Button>
          <p className="text-[11px] text-slate-400 mt-4 text-center">Ingresá con el mismo usuario y contraseña del sistema de logística.</p>
        </form>
      </div>
    </div>
  );
}

/* ============ NUEVA SOLICITUD ============ */
function NuevaSolicitud({ user, clientes, cuentas, saldosMap, saldosClienteMap, onCreated }) {
  const misClientes = useMemo(
    () => clientes.filter((c) => (c.repre_comercial || "").trim().toLowerCase() === user.nombre_completo.trim().toLowerCase()),
    [clientes, user]
  );

  const [clienteId, setClienteId] = useState("");
  const [tipo, setTipo] = useState("transferencia");
  const [subtipoTransf, setSubtipoTransf] = useState("saldo_cuenta");
  const [cuentaId, setCuentaId] = useState("");
  const [montoTransf, setMontoTransf] = useState(0);
  const [tipoCheque, setTipoCheque] = useState("electronico");
  const [lineasCheque, setLineasCheque] = useState([{ tempId: uid(), cantidad: 1, vencimiento: "", monto: 0 }]);
  const [observacion, setObservacion] = useState("");
  const [saving, setSaving] = useState(false);
  const [msg, setMsg] = useState("");

  const cuentasCliente = useMemo(() => cuentas.filter((c) => String(c.cliente_id) === String(clienteId)), [cuentas, clienteId]);
  const clienteSeleccionado = misClientes.find((c) => String(c.id) === String(clienteId));

  function addLinea() {
    setLineasCheque([...lineasCheque, { tempId: uid(), cantidad: 1, vencimiento: "", monto: 0 }]);
  }
  function removeLinea(tempId) {
    setLineasCheque(lineasCheque.filter((l) => l.tempId !== tempId));
  }
  function updateLinea(tempId, field, value) {
    setLineasCheque(lineasCheque.map((l) => (l.tempId === tempId ? { ...l, [field]: value } : l)));
  }

  function resetForm() {
    setClienteId("");
    setTipo("transferencia");
    setSubtipoTransf("saldo_cuenta");
    setCuentaId("");
    setMontoTransf(0);
    setTipoCheque("electronico");
    setLineasCheque([{ tempId: uid(), cantidad: 1, vencimiento: "", monto: 0 }]);
    setObservacion("");
  }

  async function handleSubmit(e) {
    e.preventDefault();
    setMsg("");
    if (!clienteId) { setMsg("Elegí un cliente."); return; }

    if (tipo === "transferencia") {
      if (!cuentaId) { setMsg("Elegí la cuenta bancaria."); return; }
      if (!montoTransf || montoTransf <= 0) { setMsg("Ingresá un monto válido."); return; }
    } else {
      if (lineasCheque.length === 0) { setMsg("Agregá al menos un cheque."); return; }
      for (const l of lineasCheque) {
        if (!l.vencimiento || !l.monto || l.monto <= 0 || !l.cantidad || l.cantidad <= 0) {
          setMsg("Completá cantidad, vencimiento y monto en todas las líneas de cheques.");
          return;
        }
      }
    }

    // Validación de saldo de cuenta corriente vs concepto
    const saldoCC = Number(saldosClienteMap[clienteId] || 0);
    const montoSolicitado = tipo === "transferencia"
      ? Number(montoTransf || 0)
      : lineasCheque.reduce((acc, l) => acc + Number(l.monto || 0) * Number(l.cantidad || 1), 0);

    if (montoSolicitado > saldoCC && subtipoTransf !== "anticipo") {
      const ok = window.confirm(
        "El monto solicitado (" + formatMonto(montoSolicitado) + ") supera el saldo disponible de cuenta corriente (" + formatMonto(saldoCC) + ").\n\n" +
        "Debería ingresarse con el concepto ANTICIPO.\n\n" +
        "¿Querés continuar de todas formas con el concepto actual?"
      );
      if (!ok) { setMsg("Revisá el concepto: correspondería 'Anticipo'."); return; }
    } else if (montoSolicitado <= saldoCC && subtipoTransf === "anticipo") {
      const ok = window.confirm(
        "El monto solicitado (" + formatMonto(montoSolicitado) + ") es menor o igual al saldo disponible de cuenta corriente (" + formatMonto(saldoCC) + ").\n\n" +
        "En este caso no correspondería el concepto ANTICIPO, sino 'Saldo en cuenta' o 'Cobro del día'.\n\n" +
        "¿Querés continuar de todas formas con el concepto Anticipo?"
      );
      if (!ok) { setMsg("Revisá el concepto: no correspondería 'Anticipo'."); return; }
    }

    setSaving(true);
    const { data: solicitud, error: err } = await sb
      .from("tf_solicitudes")
      .insert({
        tipo,
        cliente_id: clienteId,
        cuenta_id: tipo === "transferencia" ? cuentaId : null,
        subtipo_transferencia: subtipoTransf,
        tipo_cheque: tipo === "cheque" ? tipoCheque : null,
        monto: tipo === "transferencia" ? montoTransf : null,
        observacion: observacion.trim() || null,
        estado: "solicitado",
        usuario_solicitante: user.nombre_completo,
        fecha_hora: todayISO(),
      })
      .select()
      .single();

    if (err) {
      setMsg("Error al guardar: " + err.message);
      setSaving(false);
      return;
    }

    if (tipo === "cheque") {
      const rows = [];
      lineasCheque.forEach((l) => {
        const cant = Math.max(1, parseInt(l.cantidad, 10) || 1);
        for (let i = 0; i < cant; i++) {
          rows.push({
            solicitud_id: solicitud.id,
            cantidad: 1,
            vencimiento: l.vencimiento,
            monto: l.monto,
            estado: "solicitado",
          });
        }
      });
      const { error: err2 } = await sb.from("tf_solicitud_cheques").insert(rows);
      if (err2) {
        setMsg("Solicitud creada pero hubo un error guardando el detalle de cheques: " + err2.message);
        setSaving(false);
        return;
      }
    }

    setSaving(false);
    setMsg("✓ Solicitud creada correctamente.");
    resetForm();
    onCreated();
    setTimeout(() => setMsg(""), 3000);
  }

  const saldoCuenta = cuentaId ? saldosMap[cuentaId] : null;

  // Cálculo en vivo para la advertencia de saldo/concepto
  const saldoCCactual = clienteId ? Number(saldosClienteMap[clienteId] || 0) : 0;
  const montoActual = tipo === "transferencia"
    ? Number(montoTransf || 0)
    : lineasCheque.reduce((acc, l) => acc + Number(l.monto || 0) * Number(l.cantidad || 1), 0);
  let avisoConcepto = null;
  if (clienteId && montoActual > 0) {
    if (montoActual > saldoCCactual && subtipoTransf !== "anticipo") {
      avisoConcepto = { tipo: "warn", texto: "El monto (" + formatMonto(montoActual) + ") supera el saldo de cuenta corriente (" + formatMonto(saldoCCactual) + "). Correspondería el concepto Anticipo." };
    } else if (montoActual <= saldoCCactual && subtipoTransf === "anticipo") {
      avisoConcepto = { tipo: "info", texto: "El monto (" + formatMonto(montoActual) + ") no supera el saldo disponible. No correspondería el concepto Anticipo." };
    }
  }

  return (
    <div className="max-w-2xl">
      <h2 className="text-base font-bold text-slate-800 mb-2">Nueva Solicitud</h2>
      <form onSubmit={handleSubmit} className="bg-white rounded-xl border border-slate-200 p-4">
        <Field label="Cliente" required>
          <select className="w-full border border-slate-300 rounded-lg px-3 py-1.5 text-sm" value={clienteId} onChange={(e) => { setClienteId(e.target.value); setCuentaId(""); }}>
            <option value="">Seleccionar cliente...</option>
            {misClientes.map((c) => (
              <option key={c.id} value={c.id}>{c.nombre} — CUIT {c.cuit}</option>
            ))}
          </select>
          {misClientes.length === 0 && (
            <p className="text-xs text-amber-600 mt-1">No tenés clientes asignados. Consultá con el analista de finanzas.</p>
          )}
          {clienteId && (
            <div className="mt-1 flex items-center justify-between bg-slate-50 border border-slate-200 rounded-lg px-3 py-1">
              <span className="text-xs text-slate-500">Saldo cuenta corriente</span>
              <SaldoCC saldo={saldosClienteMap[clienteId] || 0} />
            </div>
          )}
        </Field>

        <Field label="Tipo de solicitud" required>
          <div className="flex gap-2">
            <button type="button" onClick={() => setTipo("transferencia")}
              className={"flex-1 py-1.5 rounded-lg text-sm font-medium border " + (tipo === "transferencia" ? "bg-emerald-600 text-white border-emerald-600" : "bg-white text-slate-600 border-slate-300")}>
              Transferencia
            </button>
            <button type="button" onClick={() => setTipo("cheque")}
              className={"flex-1 py-1.5 rounded-lg text-sm font-medium border " + (tipo === "cheque" ? "bg-emerald-600 text-white border-emerald-600" : "bg-white text-slate-600 border-slate-300")}>
              Cheque
            </button>
          </div>
        </Field>

        {tipo === "transferencia" && (
          <>
            <Field label="Concepto" required>
              <select className="w-full border border-slate-300 rounded-lg px-3 py-1.5 text-sm" value={subtipoTransf} onChange={(e) => setSubtipoTransf(e.target.value)}>
                <option value="saldo_cuenta">Saldo en cuenta existente</option>
                <option value="cobro_dia">Cobro del día</option>
                <option value="anticipo">Anticipo</option>
              </select>
            </Field>
            <Field label="Cuenta bancaria" required>
              <select className="w-full border border-slate-300 rounded-lg px-3 py-1.5 text-sm" value={cuentaId} onChange={(e) => setCuentaId(e.target.value)} disabled={!clienteId}>
                <option value="">Seleccionar cuenta...</option>
                {cuentasCliente.map((c) => (
                  <option key={c.id} value={c.id}>{c.banco} — {c.tipo_cuenta} — {c.cbu}</option>
                ))}
              </select>
            </Field>
            <Field label="Monto" required>
              <CurrencyInput value={montoTransf} onChange={setMontoTransf} />
            </Field>
          </>
        )}

        {tipo === "cheque" && (
          <>
            <Field label="Concepto" required>
              <select className="w-full border border-slate-300 rounded-lg px-3 py-1.5 text-sm" value={subtipoTransf} onChange={(e) => setSubtipoTransf(e.target.value)}>
                <option value="saldo_cuenta">Saldo en cuenta existente</option>
                <option value="cobro_dia">Cobro del día</option>
                <option value="anticipo">Anticipo</option>
              </select>
            </Field>
            <Field label="Tipo de cheque" required>
              <div className="flex gap-2">
                <button type="button" onClick={() => setTipoCheque("electronico")}
                  className={"flex-1 py-2 rounded-lg text-sm font-medium border " + (tipoCheque === "electronico" ? "bg-emerald-600 text-white border-emerald-600" : "bg-white text-slate-600 border-slate-300")}>
                  E-cheq
                </button>
                <button type="button" onClick={() => setTipoCheque("papel")}
                  className={"flex-1 py-2 rounded-lg text-sm font-medium border " + (tipoCheque === "papel" ? "bg-emerald-600 text-white border-emerald-600" : "bg-white text-slate-600 border-slate-300")}>
                  Cheque papel
                </button>
              </div>
            </Field>

            <div className="mb-2">
              <div className="flex items-center justify-between mb-1">
                <label className="text-xs font-semibold text-slate-600">Cheques solicitados <span className="text-rose-500">*</span></label>
                <button type="button" onClick={addLinea} className="text-xs text-emerald-700 font-semibold hover:underline">+ agregar línea</button>
              </div>
              <div className="space-y-1.5">
                {lineasCheque.map((l, idx) => (
                  <div key={l.tempId} className="grid grid-cols-12 gap-2 items-center bg-slate-50 border border-slate-200 rounded-lg p-1.5">
                    <div className="col-span-2">
                      <input type="number" min="1" value={l.cantidad} onChange={(e) => updateLinea(l.tempId, "cantidad", parseInt(e.target.value || "1", 10))}
                        className="w-full border border-slate-300 rounded-md px-2 py-1 text-sm" placeholder="Cant." />
                    </div>
                    <div className="col-span-4">
                      <input type="date" value={l.vencimiento} onChange={(e) => updateLinea(l.tempId, "vencimiento", e.target.value)}
                        className="w-full border border-slate-300 rounded-md px-2 py-1 text-sm" />
                    </div>
                    <div className="col-span-5">
                      <CurrencyInput value={l.monto} onChange={(v) => updateLinea(l.tempId, "monto", v)} />
                    </div>
                    <div className="col-span-1 text-right">
                      {lineasCheque.length > 1 && (
                        <button type="button" onClick={() => removeLinea(l.tempId)} className="text-slate-400 hover:text-rose-600 text-lg leading-none">&times;</button>
                      )}
                    </div>
                  </div>
                ))}
              </div>
              <p className="text-[11px] text-slate-400 mt-1">Si son varios cheques del mismo monto y vencimiento, poné la cantidad en una sola línea.</p>
            </div>
          </>
        )}

        <Field label="Observación">
          <textarea rows="1" className="w-full border border-slate-300 rounded-lg px-3 py-1.5 text-sm" value={observacion} onChange={(e) => setObservacion(e.target.value)} />
        </Field>

        {avisoConcepto && (
          <div className={"text-xs mb-2 rounded-lg px-3 py-1.5 border " + (avisoConcepto.tipo === "warn" ? "bg-amber-50 border-amber-200 text-amber-700" : "bg-blue-50 border-blue-200 text-blue-700")}>
            ⚠ {avisoConcepto.texto}
          </div>
        )}

        {msg && <p className={"text-sm mb-2 " + (msg.startsWith("✓") ? "text-emerald-600" : "text-rose-600")}>{msg}</p>}

        <Button type="submit" disabled={saving} className="w-full justify-center !py-2">
          {saving ? "Guardando..." : "Enviar solicitud"}
        </Button>
      </form>
    </div>
  );
}

/* ============ DETALLE DE SOLICITUD (fila expandible para cheques) ============ */
function DetalleSolicitud({ s, clientesMap, cuentasMap, cheques }) {
  const cliente = clientesMap[s.cliente_id];
  if (s.tipo === "transferencia") {
    const cuenta = cuentasMap[s.cuenta_id];
    const subtipoLabel = { saldo_cuenta: "Saldo en cuenta", cobro_dia: "Cobro del día", anticipo: "Anticipo" }[s.subtipo_transferencia] || "-";
    return (
      <div className="text-xs text-slate-500">
        {subtipoLabel} · {cuenta ? (cuenta.banco + " (" + cuenta.tipo_cuenta + ")") : "-"}
      </div>
    );
  }
  const misCheques = cheques.filter((c) => c.solicitud_id === s.id);
  return (
    <div className="text-xs text-slate-500">
      {s.tipo_cheque === "electronico" ? "E-cheq" : "Cheque papel"} ·{" "}
      {misCheques.map((c, i) => (
        <span key={c.id} className="inline-block mr-2">
          {c.cantidad}x {formatFecha(c.vencimiento)} {formatMonto(c.monto)}{i < misCheques.length - 1 ? " |" : ""}
        </span>
      ))}
    </div>
  );
}

function montoTotalSolicitud(s, cheques) {
  if (s.tipo === "transferencia") return s.monto || 0;
  return cheques.filter((c) => c.solicitud_id === s.id).reduce((acc, c) => acc + Number(c.monto) * (c.cantidad || 1), 0);
}

// Estado derivado de una solicitud de cheques, según el estado de sus cheques
function estadoDerivadoSolicitud(s, cheques) {
  if (s.tipo === "transferencia") return s.estado;
  if (s.estado === "anulado") return "anulado";
  const mis = cheques.filter((c) => c.solicitud_id === s.id);
  if (mis.length === 0) return s.estado;
  const estados = mis.map((c) => c.estado || "solicitado");
  const todos = (e) => estados.every((x) => x === e);
  if (todos("confirmado")) return "confirmado";
  if (todos("rechazado")) return "rechazado";
  if (todos("anulado")) return "anulado";
  if (todos("solicitado")) return "solicitado";
  return "parcial";
}

const ESTADO_PARCIAL_STYLE = "bg-indigo-100 text-indigo-800 border border-indigo-300";

function EstadoBadgeDerivado({ estado }) {
  if (estado === "parcial") {
    return <span className={"px-2 py-0.5 rounded-full text-xs font-semibold " + ESTADO_PARCIAL_STYLE}>PARCIAL</span>;
  }
  return <EstadoBadge estado={estado} />;
}

/* ============ GRILLA DE SOLICITUDES ============ */
function SolicitudesGrid({ user, role, solicitudes, cheques, clientes, cuentas, onRefresh }) {
  const clientesMap = useMemo(() => Object.fromEntries(clientes.map((c) => [c.id, c])), [clientes]);
  const cuentasMap = useMemo(() => Object.fromEntries(cuentas.map((c) => [c.id, c])), [cuentas]);

  const [fTipo, setFTipo] = useState("todos");
  const [fDetalle, setFDetalle] = useState("todos");
  const [fCliente, setFCliente] = useState("todos");
  const [fEstado, setFEstado] = useState("todos");

  const [modalAnular, setModalAnular] = useState(null);
  const [obsAnular, setObsAnular] = useState("");
  const [modalAnularCheque, setModalAnularCheque] = useState(null); // {cheque, solicitud} anular e-cheq individual
  const [modalGestion, setModalGestion] = useState(null); // {solicitud, accion} para transferencias
  const [modalCheque, setModalCheque] = useState(null);   // {cheque, solicitud, accion} para cheques individuales
  const [obsGestion, setObsGestion] = useState("");
  const [busy, setBusy] = useState(false);
  const [seleccionados, setSeleccionados] = useState({}); // { chequeId: true } para gestión por lote
  const [modalLote, setModalLote] = useState(null); // { accion, cheques[], clienteNombre, total }
  const [fSolicitante, setFSolicitante] = useState("todos");
  const [fFechaDesde, setFFechaDesde] = useState("");
  const [fFechaHasta, setFFechaHasta] = useState("");
  const [orden, setOrden] = useState({ col: "fecha", dir: "desc" }); // col: fecha|solicitante|cliente|tipo|vencimiento|monto|estado

  const base = role === "comercial"
    ? solicitudes.filter((s) => s.usuario_solicitante.trim().toLowerCase() === user.nombre_completo.trim().toLowerCase())
    : solicitudes;

  const misClientesOptions = role === "comercial"
    ? clientes.filter((c) => (c.repre_comercial || "").trim().toLowerCase() === user.nombre_completo.trim().toLowerCase())
    : clientes;

  // Valor de ordenamiento por columna para una solicitud
  function valorOrden(s, col) {
    switch (col) {
      case "fecha": return new Date(s.fecha_hora).getTime();
      case "solicitante": return (s.usuario_solicitante || "").toLowerCase();
      case "cliente": return (clientesMap[s.cliente_id]?.nombre || "").toLowerCase();
      case "tipo": return s.tipo === "transferencia" ? "transferencia" : (s.tipo_cheque === "electronico" ? "e-cheq" : "cheque papel");
      case "vencimiento": {
        if (s.tipo !== "cheque") return 0;
        const mis = cheques.filter((c) => c.solicitud_id === s.id);
        const fechas = mis.map((c) => new Date(c.vencimiento).getTime()).filter((n) => !isNaN(n));
        return fechas.length ? Math.min(...fechas) : 0;
      }
      case "monto": return montoTotalSolicitud(s, cheques);
      case "estado": return estadoDerivadoSolicitud(s, cheques);
      default: return 0;
    }
  }

  const filtradas = base.filter((s) => {
    if (fTipo !== "todos" && s.tipo !== fTipo) return false;
    if (fDetalle !== "todos" && s.subtipo_transferencia !== fDetalle) return false;
    if (fCliente !== "todos" && String(s.cliente_id) !== String(fCliente)) return false;
    if (fEstado !== "todos" && estadoDerivadoSolicitud(s, cheques) !== fEstado) return false;
    if (fSolicitante !== "todos" && s.usuario_solicitante !== fSolicitante) return false;
    if (fFechaDesde || fFechaHasta) {
      const fechaSol = new Date(s.fecha_hora);
      if (fFechaDesde && fechaSol < new Date(fFechaDesde + "T00:00:00")) return false;
      if (fFechaHasta && fechaSol > new Date(fFechaHasta + "T23:59:59")) return false;
    }
    return true;
  }).sort((a, b) => {
    const va = valorOrden(a, orden.col);
    const vb = valorOrden(b, orden.col);
    let cmp = 0;
    if (typeof va === "number" && typeof vb === "number") cmp = va - vb;
    else cmp = String(va).localeCompare(String(vb), "es");
    return orden.dir === "asc" ? cmp : -cmp;
  });

  function toggleOrden(col) {
    setOrden((prev) => prev.col === col ? { col, dir: prev.dir === "asc" ? "desc" : "asc" } : { col, dir: "asc" });
  }

  // Contadores de transferencias: solo afectados por el filtro de fecha, excluyendo anuladas/rechazadas
  const transferenciasEnRango = base.filter((s) => {
    if (s.tipo !== "transferencia") return false;
    if (s.estado === "anulado" || s.estado === "rechazado") return false;
    if (fFechaDesde || fFechaHasta) {
      const fechaSol = new Date(s.fecha_hora);
      if (fFechaDesde && fechaSol < new Date(fFechaDesde + "T00:00:00")) return false;
      if (fFechaHasta && fechaSol > new Date(fFechaHasta + "T23:59:59")) return false;
    }
    return true;
  });
  const totalAnticipo = transferenciasEnRango.filter((s) => s.subtipo_transferencia === "anticipo").reduce((acc, s) => acc + Number(s.monto || 0), 0);
  const totalSaldoCobro = transferenciasEnRango.filter((s) => s.subtipo_transferencia === "saldo_cuenta" || s.subtipo_transferencia === "cobro_dia").reduce((acc, s) => acc + Number(s.monto || 0), 0);

  // Encabezado clickeable con indicador de dirección
  function Th({ col, children, align }) {
    const activo = orden.col === col;
    const flecha = activo ? (orden.dir === "asc" ? " ▲" : " ▼") : "";
    return (
      <th className={"px-2 py-1.5 cursor-pointer select-none hover:text-slate-600 bg-slate-50 " + (align === "right" ? "text-right" : align === "center" ? "text-center" : "")}
        onClick={() => toggleOrden(col)} title="Ordenar">
        {children}<span className="text-emerald-600">{flecha}</span>
      </th>
    );
  }

  // Lista de solicitantes únicos (para el filtro del analista)
  const solicitantesUnicos = [...new Set(base.map((s) => s.usuario_solicitante))].filter(Boolean).sort();

  // ---- Selección por lote de e-cheqs (solo analista) ----
  // Mapa chequeId -> {cheque, solicitud} para los cheques visibles en estado solicitado
  const solicitudPorId = useMemo(() => Object.fromEntries(solicitudes.map((s) => [s.id, s])), [solicitudes]);
  const chequeInfo = useMemo(() => {
    const m = {};
    cheques.forEach((c) => {
      const s = solicitudPorId[c.solicitud_id];
      if (s) m[c.id] = { cheque: c, solicitud: s };
    });
    return m;
  }, [cheques, solicitudPorId]);

  const idsSeleccionados = Object.keys(seleccionados).filter((id) => seleccionados[id]);
  const chequesSeleccionados = idsSeleccionados.map((id) => chequeInfo[id]).filter(Boolean);
  const totalSeleccionado = chequesSeleccionados.reduce((acc, x) => acc + Number(x.cheque.monto || 0), 0);
  const clientesEnSeleccion = [...new Set(chequesSeleccionados.map((x) => x.solicitud.cliente_id))];
  const mismoClienteSeleccion = clientesEnSeleccion.length <= 1;
  // Cliente actualmente seleccionado (para bloquear otros); null si no hay selección
  const clienteSeleccionActual = clientesEnSeleccion.length >= 1 ? clientesEnSeleccion[0] : null;
  const clienteSeleccionNombre = clientesEnSeleccion.length === 1 ? (clientesMap[clientesEnSeleccion[0]]?.nombre || "") : "";

  function toggleCheque(id, clienteId) {
    // Si ya hay cheques de otro cliente seleccionados, no permitir
    if (!seleccionados[id] && clienteSeleccionActual !== null && clienteSeleccionActual !== clienteId) {
      alert("Solo podés seleccionar e-cheqs de un mismo cliente a la vez.");
      return;
    }
    setSeleccionados((prev) => ({ ...prev, [id]: !prev[id] }));
  }
  function limpiarSeleccion() {
    setSeleccionados({});
  }

  function abrirModalLote(accion) {
    if (chequesSeleccionados.length === 0) return;
    if (!mismoClienteSeleccion) {
      alert("Solo podés gestionar por lote cheques del mismo cliente. Deseleccioná los de otros clientes.");
      return;
    }
    setObsGestion("");
    setModalLote({ accion, cheques: chequesSeleccionados, clienteNombre: clienteSeleccionNombre, total: totalSeleccionado });
  }

  async function confirmarGestionLote() {
    const { accion, cheques: chs } = modalLote;
    if (accion === "rechazado" && !obsGestion.trim()) return;
    setBusy(true);
    const obs = obsGestion.trim()
      ? (accion === "rechazado" ? "Rechazado: " : "Confirmado: ") + obsGestion.trim()
      : (accion === "confirmado" ? "Confirmado por " + user.nombre_completo : null);
    const ids = chs.map((x) => x.cheque.id);
    const { error } = await sb.from("tf_solicitud_cheques")
      .update({ estado: accion, fecha_gestion: todayISO(), observacion_gestion: obs })
      .in("id", ids);
    if (error) { setBusy(false); alert("Error al gestionar el lote: " + error.message); return; }
    // Recalcular estado de cada solicitud padre afectada
    const solicitudesAfectadas = [...new Set(chs.map((x) => x.solicitud.id))];
    for (const solId of solicitudesAfectadas) {
      const { data: hermanos } = await sb.from("tf_solicitud_cheques").select("*").eq("solicitud_id", solId);
      const estados = (hermanos || []).map((c) => c.estado || "solicitado");
      let nuevo = "parcial";
      if (estados.every((e) => e === "confirmado")) nuevo = "confirmado";
      else if (estados.every((e) => e === "rechazado")) nuevo = "rechazado";
      else if (estados.every((e) => e === "solicitado")) nuevo = "solicitado";
      else if (estados.every((e) => e === "anulado")) nuevo = "anulado";
      await sb.from("tf_solicitudes").update({ estado: nuevo === "parcial" ? "solicitado" : nuevo }).eq("id", solId);
    }
    setBusy(false);
    setModalLote(null);
    setObsGestion("");
    limpiarSeleccion();
    onRefresh();
  }


  async function confirmarAnulacion() {
    if (!obsAnular.trim()) return;
    setBusy(true);
    const obs = "Anulada por " + user.nombre_completo + ": " + obsAnular.trim();
    await sb.from("tf_solicitudes").update({ estado: "anulado", observacion_gestion: obs }).eq("id", modalAnular.id);
    // Si es cheque, anular todos sus cheques en estado solicitado
    if (modalAnular.tipo === "cheque") {
      await sb.from("tf_solicitud_cheques").update({ estado: "anulado", observacion_gestion: obs })
        .eq("solicitud_id", modalAnular.id).eq("estado", "solicitado");
    }
    setBusy(false);
    setModalAnular(null);
    setObsAnular("");
    onRefresh();
  }

  // Anular un e-cheq individual (comercial), con observación obligatoria
  async function confirmarAnulacionCheque() {
    if (!obsAnular.trim()) return;
    const { cheque, solicitud } = modalAnularCheque;
    setBusy(true);
    const obs = "Anulado por " + user.nombre_completo + ": " + obsAnular.trim();
    const { error } = await sb.from("tf_solicitud_cheques")
      .update({ estado: "anulado", observacion_gestion: obs, fecha_gestion: todayISO() })
      .eq("id", cheque.id);
    if (error) { setBusy(false); alert("Error al anular el cheque: " + error.message); return; }
    // Recalcular estado de la solicitud padre
    const { data: hermanos } = await sb.from("tf_solicitud_cheques").select("*").eq("solicitud_id", solicitud.id);
    const estados = (hermanos || []).map((c) => c.id === cheque.id ? "anulado" : (c.estado || "solicitado"));
    let nuevo = "parcial";
    if (estados.every((e) => e === "confirmado")) nuevo = "confirmado";
    else if (estados.every((e) => e === "rechazado")) nuevo = "rechazado";
    else if (estados.every((e) => e === "anulado")) nuevo = "anulado";
    else if (estados.every((e) => e === "solicitado")) nuevo = "solicitado";
    await sb.from("tf_solicitudes").update({ estado: nuevo === "parcial" ? "solicitado" : nuevo }).eq("id", solicitud.id);
    setBusy(false);
    setModalAnularCheque(null);
    setObsAnular("");
    onRefresh();
  }

  // Gestión de transferencia completa
  async function confirmarGestion() {
    const { solicitud, accion } = modalGestion;
    if (accion === "rechazado" && !obsGestion.trim()) return;
    setBusy(true);
    const { error } = await sb.from("tf_solicitudes").update({
      estado: accion,
      fecha_gestion: todayISO(),
      observacion_gestion: obsGestion.trim()
        ? (accion === "rechazado" ? "Rechazada: " : "Confirmada: ") + obsGestion.trim()
        : (accion === "confirmado" ? "Confirmada por " + user.nombre_completo : null),
    }).eq("id", solicitud.id);
    setBusy(false);
    if (error) { alert("Error al actualizar: " + error.message); return; }
    setModalGestion(null);
    setObsGestion("");
    onRefresh();
  }

  // Gestión de un cheque individual
  async function confirmarGestionCheque() {
    const { cheque, solicitud, accion } = modalCheque;
    if (accion === "rechazado" && !obsGestion.trim()) return;
    setBusy(true);
    const { error: errCheque } = await sb.from("tf_solicitud_cheques").update({
      estado: accion,
      fecha_gestion: todayISO(),
      observacion_gestion: obsGestion.trim()
        ? (accion === "rechazado" ? "Rechazado: " : "Confirmado: ") + obsGestion.trim()
        : (accion === "confirmado" ? "Confirmado por " + user.nombre_completo : null),
    }).eq("id", cheque.id);
    if (errCheque) { setBusy(false); alert("Error al actualizar el cheque: " + errCheque.message); return; }
    // Recalcular estado de la solicitud padre según todos sus cheques
    const { data: hermanos } = await sb.from("tf_solicitud_cheques").select("*").eq("solicitud_id", solicitud.id);
    const estados = (hermanos || []).map((c) => c.id === cheque.id ? accion : (c.estado || "solicitado"));
    let nuevoEstado = "parcial";
    if (estados.every((e) => e === "confirmado")) nuevoEstado = "confirmado";
    else if (estados.every((e) => e === "rechazado")) nuevoEstado = "rechazado";
    else if (estados.every((e) => e === "solicitado")) nuevoEstado = "solicitado";
    else if (estados.every((e) => e === "anulado")) nuevoEstado = "anulado";
    // Guardamos 'confirmado' si está totalmente resuelto, si no dejamos 'solicitado' (el badge deriva parcial en vivo)
    const estadoParaBase = (nuevoEstado === "parcial") ? "solicitado" : nuevoEstado;
    await sb.from("tf_solicitudes").update({ estado: estadoParaBase }).eq("id", solicitud.id);
    setBusy(false);
    setModalCheque(null);
    setObsGestion("");
    onRefresh();
  }

  function handleExport() {
    const rows = [];
    filtradas.forEach((s) => {
      const cliente = clientesMap[s.cliente_id];
      const cuenta = cuentasMap[s.cuenta_id];
      const conceptoLabel = { saldo_cuenta: "Saldo en cuenta", cobro_dia: "Cobro del día", anticipo: "Anticipo" }[s.subtipo_transferencia] || "";
      if (s.tipo === "transferencia") {
        rows.push({
          "Fecha/Hora": formatFechaHora(s.fecha_hora),
          "Solicitante": s.usuario_solicitante,
          "Cliente": cliente ? cliente.nombre : "",
          "CUIT": cliente ? cliente.cuit : "",
          "Tipo": "Transferencia",
          "Detalle": conceptoLabel,
          "Cuenta": cuenta ? (cuenta.banco + " - " + cuenta.tipo_cuenta) : "",
          "Número de cuenta": cuenta ? (cuenta.cbu || "") : "",
          "Vencimiento": "",
          "Monto": Number(s.monto || 0),
          "Estado": s.estado,
          "Observación": s.observacion || "",
          "Observación Gestión": s.observacion_gestion || "",
        });
      } else {
        const mis = cheques.filter((c) => c.solicitud_id === s.id);
        mis.forEach((c) => {
          rows.push({
            "Fecha/Hora": formatFechaHora(s.fecha_hora),
            "Solicitante": s.usuario_solicitante,
            "Cliente": cliente ? cliente.nombre : "",
            "CUIT": cliente ? cliente.cuit : "",
            "Tipo": s.tipo_cheque === "electronico" ? "E-cheq" : "Cheque papel",
            "Detalle": conceptoLabel,
            "Cuenta": "",
            "Número de cuenta": "",
            "Vencimiento": formatFecha(c.vencimiento),
            "Monto": Number(c.monto || 0),
            "Estado": c.estado || "solicitado",
            "Observación": s.observacion || "",
            "Observación Gestión": c.observacion_gestion || "",
          });
        });
      }
    });
    exportToExcel(rows, "solicitudes_" + new Date().toISOString().slice(0, 10) + ".xlsx", ["Monto"]);
  }

  // Render unificado y compacto. modo: 'analista' | 'comercial'
  function renderFilas(s, modo, ctx) {
    const cliente = clientesMap[s.cliente_id];
    const clienteNombre = cliente ? cliente.nombre : "-";
    const clienteCuit = cliente ? cliente.cuit : "";
    const cellCls = "px-2 py-0.5 align-middle";
    // Color alternado por fila visible (una sí, una no)
    const bgFila = () => (ctx.fila++ % 2 === 1 ? "bg-emerald-50" : "bg-white");

    // Acciones según modo y estado
    const accionesTransfer = () => {
      if (modo === "analista" && s.estado === "solicitado") {
        return (
          <div className="flex gap-1 justify-end">
            <Button variant="primary" className="!px-2 !py-0.5 !text-xs" onClick={() => { setObsGestion(""); setModalGestion({ solicitud: s, accion: "confirmado" }); }}>✓</Button>
            <Button variant="danger" className="!px-2 !py-0.5 !text-xs" onClick={() => { setObsGestion(""); setModalGestion({ solicitud: s, accion: "rechazado" }); }}>✕</Button>
          </div>
        );
      }
      if (modo === "comercial" && s.estado === "solicitado") {
        return <Button variant="danger" className="!px-2 !py-0.5 !text-xs" onClick={() => { setObsAnular(""); setModalAnular(s); }}>Anular</Button>;
      }
      return null;
    };

    if (s.tipo === "transferencia") {
      const cuenta = cuentasMap[s.cuenta_id];
      return (
        <tr key={s.id} className={bgFila() + " border-b border-slate-100"}>
          {modo === "analista" && <td className={cellCls}></td>}
          <td className={cellCls + " whitespace-nowrap text-[11px] text-slate-500"}>{formatFechaHora(s.fecha_hora)}</td>
          {modo === "analista" && (
            <td className={cellCls}>
              <div className="font-medium text-slate-700 text-[11px] leading-tight">{s.usuario_solicitante}</div>
            </td>
          )}
          <td className={cellCls}>
            <div className="font-medium text-slate-700 text-[11px] leading-tight">{clienteNombre}</div>
            <div className="text-[10px] text-slate-400 leading-tight">{clienteCuit}</div>
          </td>
          <td className={cellCls}>
            <div className="flex flex-wrap gap-1">
              <TipoTag tipo="transferencia" />
              <ConceptoTag concepto={s.subtipo_transferencia} />
            </div>
            <div className="text-[10px] text-slate-500 leading-tight whitespace-nowrap">
              {cuenta ? (cuenta.banco + " (" + cuenta.tipo_cuenta + ")" + (cuenta.cbu ? " · " + cuenta.cbu : "")) : "-"}
            </div>
          </td>
          <td className={cellCls + " text-[11px] text-slate-500 whitespace-nowrap text-center"}>-</td>
          <td className={cellCls + " text-right font-semibold text-slate-700 text-[11px] whitespace-nowrap"}>{formatMonto(s.monto)}</td>
          <td className={cellCls + " whitespace-nowrap"}>
            <EstadoBadge estado={s.estado} />
            {s.fecha_gestion && <div className="text-[10px] text-slate-400 leading-tight mt-0.5 whitespace-nowrap">{formatFechaHora(s.fecha_gestion)}</div>}
          </td>
          <td className={cellCls + " text-[10px] text-slate-500 min-w-[140px] leading-tight"}>
            <div>{s.observacion || "-"}</div>
            {s.observacion_gestion && <div className="text-slate-400 italic">{s.observacion_gestion}</div>}
          </td>
          <td className={cellCls + " text-right whitespace-nowrap"}>{accionesTransfer()}</td>
        </tr>
      );
    }

    // Cheques: una fila por cheque, cliente repetido en cada fila
    const mis = cheques.filter((c) => c.solicitud_id === s.id).sort((a, b) => new Date(a.vencimiento) - new Date(b.vencimiento));
    const estadoDer = estadoDerivadoSolicitud(s, cheques);
    return mis.map((c, idx) => {
      const cEstado = c.estado || "solicitado";
      let acciones = null;
      if (modo === "analista" && cEstado === "solicitado") {
        const estaEnLote = !!seleccionados[c.id] && idsSeleccionados.length > 1;
        acciones = (
          <div className="flex gap-1 justify-end">
            <Button variant="primary" className="!px-2 !py-0.5 !text-xs"
              onClick={() => { setObsGestion(""); estaEnLote ? abrirModalLote("confirmado") : setModalCheque({ cheque: c, solicitud: s, accion: "confirmado" }); }}>✓</Button>
            <Button variant="danger" className="!px-2 !py-0.5 !text-xs"
              onClick={() => { setObsGestion(""); estaEnLote ? abrirModalLote("rechazado") : setModalCheque({ cheque: c, solicitud: s, accion: "rechazado" }); }}>✕</Button>
          </div>
        );
      } else if (modo === "comercial" && cEstado === "solicitado") {
        acciones = (
          <div className="flex gap-1 justify-end items-center">
            <Button variant="danger" className="!px-2 !py-0.5 !text-[10px]" onClick={() => { setObsAnular(""); setModalAnularCheque({ cheque: c, solicitud: s }); }}>Anular</Button>
            {idx === 0 && mis.filter((x) => (x.estado || "solicitado") === "solicitado").length > 1 && (
              <Button variant="secondary" className="!px-2 !py-0.5 !text-[10px]" onClick={() => { setObsAnular(""); setModalAnular(s); }}>Anular todo</Button>
            )}
          </div>
        );
      }
      // El checkbox se deshabilita si ya hay selección de otro cliente
      const hayOtroCliente = idsSeleccionados.length > 0 && clienteSeleccionActual !== null && clienteSeleccionActual !== s.cliente_id;
      const puedeSeleccionar = s.tipo_cheque === "electronico" && cEstado === "solicitado";
      return (
        <tr key={c.id} className={bgFila() + " border-b border-slate-100"}>
          {modo === "analista" && (
            <td className={cellCls + " text-center"}>
              {puedeSeleccionar && (
                <input type="checkbox" checked={!!seleccionados[c.id]} disabled={hayOtroCliente && !seleccionados[c.id]}
                  onChange={() => toggleCheque(c.id, s.cliente_id)}
                  className={hayOtroCliente && !seleccionados[c.id] ? "cursor-not-allowed opacity-30" : "cursor-pointer"}
                  title={hayOtroCliente && !seleccionados[c.id] ? "Ya seleccionaste e-cheqs de otro cliente" : ""} />
              )}
            </td>
          )}
          <td className={cellCls + " whitespace-nowrap text-[11px] text-slate-500"}>{formatFechaHora(s.fecha_hora)}</td>
          {modo === "analista" && (
            <td className={cellCls}>
              <div className="font-medium text-slate-700 text-[11px] leading-tight">{s.usuario_solicitante}</div>
            </td>
          )}
          <td className={cellCls}>
            <div className="font-medium text-slate-700 text-[11px] leading-tight">{clienteNombre}</div>
            <div className="text-[10px] text-slate-400 leading-tight">{clienteCuit}</div>
          </td>
          <td className={cellCls}>
            <div className="flex flex-wrap gap-1">
              <TipoTag tipo="cheque" tipoCheque={s.tipo_cheque} />
              <ConceptoTag concepto={s.subtipo_transferencia} />
            </div>
            <div className="text-[10px] text-slate-500 leading-tight">Cheque {idx + 1} de {mis.length}</div>
          </td>
          <td className={cellCls + " text-[11px] text-slate-600 whitespace-nowrap text-center"}>{formatFecha(c.vencimiento)}</td>
          <td className={cellCls + " text-right font-semibold text-slate-700 text-[11px] whitespace-nowrap"}>{formatMonto(c.monto)}</td>
          <td className={cellCls + " whitespace-nowrap"}>
            <EstadoBadge estado={cEstado} />
            {c.fecha_gestion && <div className="text-[10px] text-slate-400 leading-tight mt-0.5 whitespace-nowrap">{formatFechaHora(c.fecha_gestion)}</div>}
          </td>
          <td className={cellCls + " text-[10px] text-slate-500 min-w-[140px] leading-tight"}>
            {idx === 0 && <div>{s.observacion || "-"}</div>}
            {c.observacion_gestion && <div className="text-slate-400 italic">{c.observacion_gestion}</div>}
          </td>
          <td className={cellCls + " text-right whitespace-nowrap"}>{acciones}</td>
        </tr>
      );
    });
  }

  const esAnalista = role === "analista_finanzas";

  return (
    <div className="flex flex-col" style={{ height: "calc(100vh - 90px)" }}>
      <div className="flex flex-wrap items-end gap-3 mb-4 flex-shrink-0">
        <div>
          <label className="block text-[9px] font-semibold text-slate-500 mb-1 uppercase">Tipo</label>
          <select className="border border-slate-300 rounded-lg px-2 py-1 text-[11px]" value={fTipo} onChange={(e) => setFTipo(e.target.value)}>
            <option value="todos">Todos</option>
            <option value="transferencia">Transferencia</option>
            <option value="cheque">Cheque</option>
          </select>
        </div>
        <div>
          <label className="block text-[9px] font-semibold text-slate-500 mb-1 uppercase">Detalle</label>
          <select className="border border-slate-300 rounded-lg px-2 py-1 text-[11px]" value={fDetalle} onChange={(e) => setFDetalle(e.target.value)}>
            <option value="todos">Todos</option>
            <option value="saldo_cuenta">Saldo en cuenta</option>
            <option value="cobro_dia">Cobro del día</option>
            <option value="anticipo">Anticipo</option>
          </select>
        </div>
        <div>
          <label className="block text-[9px] font-semibold text-slate-500 mb-1 uppercase">Cliente</label>
          <select className="border border-slate-300 rounded-lg px-2 py-1 text-[11px]" value={fCliente} onChange={(e) => setFCliente(e.target.value)}>
            <option value="todos">Todos</option>
            {misClientesOptions.map((c) => <option key={c.id} value={c.id}>{c.nombre}</option>)}
          </select>
        </div>
        {esAnalista && (
          <div>
            <label className="block text-[9px] font-semibold text-slate-500 mb-1 uppercase">Solicitante</label>
            <select className="border border-slate-300 rounded-lg px-2 py-1 text-[11px]" value={fSolicitante} onChange={(e) => setFSolicitante(e.target.value)}>
              <option value="todos">Todos</option>
              {solicitantesUnicos.map((s) => <option key={s} value={s}>{s}</option>)}
            </select>
          </div>
        )}
        <div>
          <label className="block text-[9px] font-semibold text-slate-500 mb-1 uppercase">Estado</label>
          <select className="border border-slate-300 rounded-lg px-2 py-1 text-[11px]" value={fEstado} onChange={(e) => setFEstado(e.target.value)}>
            <option value="todos">Todos</option>
            <option value="solicitado">Solicitado</option>
            <option value="confirmado">Confirmado</option>
            <option value="rechazado">Rechazado</option>
            <option value="parcial">Parcial</option>
            <option value="anulado">Anulado</option>
          </select>
        </div>
        <div>
          <label className="block text-[9px] font-semibold text-slate-500 mb-1 uppercase">Fecha desde</label>
          <input type="date" className="border border-slate-300 rounded-lg px-2 py-1 text-[11px]" value={fFechaDesde} onChange={(e) => setFFechaDesde(e.target.value)} />
        </div>
        <div>
          <label className="block text-[9px] font-semibold text-slate-500 mb-1 uppercase">Fecha hasta</label>
          <input type="date" className="border border-slate-300 rounded-lg px-2 py-1 text-[11px]" value={fFechaHasta} onChange={(e) => setFFechaHasta(e.target.value)} />
        </div>
        {(fFechaDesde || fFechaHasta) && (
          <button onClick={() => { setFFechaDesde(""); setFFechaHasta(""); }} className="text-[11px] text-slate-500 hover:text-slate-700 underline pb-1.5">limpiar fechas</button>
        )}
        <div className="ml-auto">
          <Button variant="secondary" onClick={handleExport} className="!px-2 !py-1 !text-[11px]">⬇ Exportar Excel</Button>
        </div>
      </div>

      <div className="flex flex-wrap gap-3 mb-4 flex-shrink-0">
        <div className="flex-1 min-w-[220px] bg-emerald-50 border border-emerald-200 rounded-xl px-4 py-2.5 flex items-center justify-between">
          <div>
            <div className="text-[10px] uppercase tracking-wide text-emerald-600 font-semibold">Transferencias · Saldo / Cobro del día</div>
            <div className="text-[10px] text-slate-400">excluye anuladas y rechazadas</div>
          </div>
          <div className="text-lg font-bold text-emerald-700">{formatMonto(totalSaldoCobro)}</div>
        </div>
        <div className="flex-1 min-w-[220px] bg-rose-50 border border-rose-200 rounded-xl px-4 py-2.5 flex items-center justify-between">
          <div>
            <div className="text-[10px] uppercase tracking-wide text-rose-600 font-semibold">Transferencias · Anticipo</div>
            <div className="text-[10px] text-slate-400">excluye anuladas y rechazadas</div>
          </div>
          <div className="text-lg font-bold text-rose-700">{formatMonto(totalAnticipo)}</div>
        </div>
      </div>

      {esAnalista && chequesSeleccionados.length > 0 && (
        <div className="mb-3 flex flex-wrap items-center gap-3 bg-emerald-50 border border-emerald-200 rounded-xl px-4 py-2.5">
          <span className="text-sm font-medium text-emerald-800">
            {chequesSeleccionados.length} e-cheq seleccionado(s)
            {clienteSeleccionNombre && <span className="text-emerald-600"> · {clienteSeleccionNombre}</span>}
          </span>
          <span className="text-sm text-slate-600">Total acumulado: <b className="text-slate-800">{formatMonto(totalSeleccionado)}</b></span>
          {!mismoClienteSeleccion && (
            <span className="text-xs text-rose-600 font-medium">⚠ Hay cheques de distintos clientes. Seleccioná uno solo.</span>
          )}
          <div className="ml-auto flex gap-2">
            <Button variant="primary" disabled={!mismoClienteSeleccion} onClick={() => abrirModalLote("confirmado")}>✓ Confirmar lote</Button>
            <Button variant="danger" disabled={!mismoClienteSeleccion} onClick={() => abrirModalLote("rechazado")}>✕ Rechazar lote</Button>
            <Button variant="secondary" onClick={limpiarSeleccion}>Limpiar</Button>
          </div>
        </div>
      )}

      <div className="bg-white rounded-xl border border-slate-200 overflow-auto flex-1 min-h-0">
        <table className="w-full text-sm">
          <thead className="sticky top-0 z-10 bg-slate-50">
            <tr className="text-left text-[10px] uppercase tracking-wide text-slate-400 border-b border-slate-200">
              {esAnalista && <th className="px-2 py-1.5 w-8 bg-slate-50"></th>}
              <Th col="fecha">Fecha/Hora</Th>
              {esAnalista && <Th col="solicitante">Solicitante</Th>}
              <Th col="cliente">Cliente</Th>
              <Th col="tipo">Tipo / Detalle</Th>
              <Th col="vencimiento" align="center">Vencimiento</Th>
              <Th col="monto" align="right">Monto</Th>
              <Th col="estado">Estado</Th>
              <th className="px-2 py-1.5 bg-slate-50">Observación</th>
              <th className="px-2 py-1.5 text-right bg-slate-50">Acciones</th>
            </tr>
          </thead>
          <tbody>
            {(() => {
              const ctx = { fila: 0 };
              return filtradas.map((s) => renderFilas(s, esAnalista ? "analista" : "comercial", ctx));
            })()}
            {filtradas.length === 0 && (
              <tr><td colSpan={esAnalista ? 10 : 8} className="px-3 py-8 text-center text-slate-400">No hay solicitudes que coincidan con los filtros.</td></tr>
            )}
          </tbody>
        </table>
      </div>

      {modalAnular && (
        <Modal title="Anular solicitud" onClose={() => setModalAnular(null)}>
          <p className="text-sm text-slate-600 mb-3">Vas a anular la solicitud de <b>{clientesMap[modalAnular.cliente_id]?.nombre}</b>. Indicá el motivo:</p>
          <textarea rows="3" className="w-full border border-slate-300 rounded-lg px-3 py-1.5 text-sm mb-3" value={obsAnular} onChange={(e) => setObsAnular(e.target.value)} placeholder="Motivo de la anulación (obligatorio)" />
          <div className="flex justify-end gap-2">
            <Button variant="secondary" onClick={() => setModalAnular(null)}>Cancelar</Button>
            <Button variant="danger" disabled={!obsAnular.trim() || busy} onClick={confirmarAnulacion}>Confirmar anulación</Button>
          </div>
        </Modal>
      )}

      {modalAnularCheque && (
        <Modal title="Anular e-cheq" onClose={() => setModalAnularCheque(null)}>
          <p className="text-sm text-slate-600 mb-3">
            Vas a anular un e-cheq de <b>{clientesMap[modalAnularCheque.solicitud.cliente_id]?.nombre}</b>:<br />
            <b>{formatMonto(modalAnularCheque.cheque.monto)}</b> · Vence {formatFecha(modalAnularCheque.cheque.vencimiento)}
          </p>
          <textarea rows="3" className="w-full border border-slate-300 rounded-lg px-3 py-1.5 text-sm mb-3" value={obsAnular} onChange={(e) => setObsAnular(e.target.value)} placeholder="Motivo de la anulación (obligatorio)" />
          <div className="flex justify-end gap-2">
            <Button variant="secondary" onClick={() => setModalAnularCheque(null)}>Cancelar</Button>
            <Button variant="danger" disabled={!obsAnular.trim() || busy} onClick={confirmarAnulacionCheque}>Confirmar anulación</Button>
          </div>
        </Modal>

      {modalGestion && (
        <Modal title={modalGestion.accion === "confirmado" ? "Confirmar transferencia" : "Rechazar transferencia"} onClose={() => setModalGestion(null)}>
          <p className="text-sm text-slate-600 mb-3">
            Cliente: <b>{clientesMap[modalGestion.solicitud.cliente_id]?.nombre}</b> — Monto: <b>{formatMonto(modalGestion.solicitud.monto)}</b>
          </p>
          <textarea rows="3" className="w-full border border-slate-300 rounded-lg px-3 py-1.5 text-sm mb-3" value={obsGestion} onChange={(e) => setObsGestion(e.target.value)}
            placeholder={modalGestion.accion === "rechazado" ? "Motivo del rechazo (obligatorio)" : "Observación (opcional)"} />
          <div className="flex justify-end gap-2">
            <Button variant="secondary" onClick={() => setModalGestion(null)}>Cancelar</Button>
            <Button variant={modalGestion.accion === "confirmado" ? "primary" : "danger"}
              disabled={(modalGestion.accion === "rechazado" && !obsGestion.trim()) || busy}
              onClick={confirmarGestion}>
              {modalGestion.accion === "confirmado" ? "Confirmar" : "Rechazar"}
            </Button>
          </div>
        </Modal>
      )}

      {modalCheque && (
        <Modal title={modalCheque.accion === "confirmado" ? "Confirmar cheque" : "Rechazar cheque"} onClose={() => setModalCheque(null)}>
          <p className="text-sm text-slate-600 mb-3">
            Cliente: <b>{clientesMap[modalCheque.solicitud.cliente_id]?.nombre}</b><br />
            Cheque: <b>{formatMonto(modalCheque.cheque.monto)}</b> · Vence {formatFecha(modalCheque.cheque.vencimiento)}
          </p>
          <textarea rows="3" className="w-full border border-slate-300 rounded-lg px-3 py-1.5 text-sm mb-3" value={obsGestion} onChange={(e) => setObsGestion(e.target.value)}
            placeholder={modalCheque.accion === "rechazado" ? "Motivo del rechazo (obligatorio)" : "Observación (opcional)"} />
          <div className="flex justify-end gap-2">
            <Button variant="secondary" onClick={() => setModalCheque(null)}>Cancelar</Button>
            <Button variant={modalCheque.accion === "confirmado" ? "primary" : "danger"}
              disabled={(modalCheque.accion === "rechazado" && !obsGestion.trim()) || busy}
              onClick={confirmarGestionCheque}>
              {modalCheque.accion === "confirmado" ? "Confirmar" : "Rechazar"}
            </Button>
          </div>
        </Modal>
      )}

      {modalLote && (
        <Modal title={modalLote.accion === "confirmado" ? "Confirmar lote de e-cheqs" : "Rechazar lote de e-cheqs"} onClose={() => setModalLote(null)}>
          <div className="text-sm text-slate-600 mb-3 space-y-1">
            <div>Cliente: <b>{modalLote.clienteNombre}</b></div>
            <div>Cantidad de e-cheqs: <b>{modalLote.cheques.length}</b></div>
            <div>Monto total acumulado: <b className="text-slate-800">{formatMonto(modalLote.total)}</b></div>
          </div>
          <div className="max-h-40 overflow-y-auto mb-3 rounded-lg border border-slate-200">
            <table className="w-full text-xs">
              <tbody>
                {modalLote.cheques.map((x) => (
                  <tr key={x.cheque.id} className="border-b border-slate-50 last:border-0">
                    <td className="px-2 py-1 text-slate-500">{formatFecha(x.cheque.vencimiento)}</td>
                    <td className="px-2 py-1 text-right font-medium text-slate-700">{formatMonto(x.cheque.monto)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <textarea rows="3" className="w-full border border-slate-300 rounded-lg px-3 py-1.5 text-sm mb-3" value={obsGestion} onChange={(e) => setObsGestion(e.target.value)}
            placeholder={modalLote.accion === "rechazado" ? "Motivo del rechazo (obligatorio)" : "Observación (opcional)"} />
          <div className="flex justify-end gap-2">
            <Button variant="secondary" onClick={() => setModalLote(null)}>Cancelar</Button>
            <Button variant={modalLote.accion === "confirmado" ? "primary" : "danger"}
              disabled={(modalLote.accion === "rechazado" && !obsGestion.trim()) || busy}
              onClick={confirmarGestionLote}>
              {modalLote.accion === "confirmado" ? "Confirmar " + modalLote.cheques.length + " e-cheq(s)" : "Rechazar " + modalLote.cheques.length + " e-cheq(s)"}
            </Button>
          </div>
        </Modal>
      )}
    </div>
  );
}

      await sb.from("tf_cuentas_bancarias").update(payload).eq("id", form.id);

      await sb.from("tf_cuentas_bancarias").insert(payload);

/* ============ CARGA DE SALDOS ============ */
function CargaSaldos({ clientes, onRefresh, saldosClienteMap }) {
  const fileRef = useRef(null);
  const [log, setLog] = useState("");
  const [procesando, setProcesando] = useState(false);
  const clientesPorCuit = useMemo(() => Object.fromEntries(clientes.map((c) => [String(c.cuit).replace(/\D/g, ""), c])), [clientes]);

  function handleFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    setProcesando(true);
    setLog("Procesando archivo...");
    const reader = new FileReader();
    reader.onload = async (evt) => {
      try {
        const wb = XLSX.read(evt.target.result, { type: "array" });
        const ws = wb.Sheets[wb.SheetNames[0]];
        // El reporte tiene metadata en las primeras filas; los encabezados reales están en la fila 5 (índice 4)
        const matriz = XLSX.utils.sheet_to_json(ws, { header: 1 });
        // Buscar la fila de encabezados (la que contiene "Razon Social" y "Cuit")
        let headerIdx = matriz.findIndex((row) => row.some((c) => String(c).trim().toLowerCase() === "cuit"));
        if (headerIdx === -1) headerIdx = 4;
        const headers = matriz[headerIdx].map((h) => String(h).trim().toLowerCase());
        const idx = {
          razon: headers.indexOf("razon social"),
          cuit: headers.indexOf("cuit"),
          repre: headers.indexOf("representante"),
          deudor: headers.indexOf("saldo deudor"),
          acreedor: headers.indexOf("saldo acreedor"),
        };
        if (idx.cuit === -1 || idx.deudor === -1 || idx.acreedor === -1) {
          setLog("No se encontraron las columnas esperadas (Razon Social, Cuit, Saldo Deudor, Saldo Acreedor). Revisá el archivo.");
          setProcesando(false);
          return;
        }

        // Consolidar por CUIT: omitir 'mercap', sumar deudor/acreedor
        const consolidado = {}; // cuitNorm -> saldo
        let omitidosMercap = 0, sinCuit = 0;
        for (let i = headerIdx + 1; i < matriz.length; i++) {
          const row = matriz[i];
          if (!row || row.length === 0) continue;
          const razon = String(row[idx.razon] || "").trim();
          const cuitRaw = String(row[idx.cuit] || "").trim();
          const cuitNorm = cuitRaw.replace(/\D/g, "");
          if (razon.toLowerCase().includes("mercap")) { omitidosMercap++; continue; }
          if (cuitNorm.length < 10) { sinCuit++; continue; }
          const deudor = Math.abs(Number(row[idx.deudor]) || 0);
          const acreedor = Math.abs(Number(row[idx.acreedor]) || 0);
          const saldo = acreedor - deudor; // + a favor (verde), - deudor (rojo)
          consolidado[cuitNorm] = (consolidado[cuitNorm] || 0) + saldo;
        }

        // Matchear con clientes cargados y armar filas para upsert
        const filas = [];
        let sinMatch = 0;
        Object.entries(consolidado).forEach(([cuitNorm, saldo]) => {
          const cliente = clientesPorCuit[cuitNorm];
          if (!cliente) { sinMatch++; return; }
          filas.push({ cliente_id: cliente.id, saldo, fecha_actualizacion: todayISO() });
        });

        // Pisar todo: borrar saldos anteriores y cargar los nuevos
        await sb.from("tf_saldos_cliente").delete().neq("cliente_id", "00000000-0000-0000-0000-000000000000");
        // Insertar en lotes de 500
        let insertados = 0;
        for (let i = 0; i < filas.length; i += 500) {
          const lote = filas.slice(i, i + 500);
          const { error } = await sb.from("tf_saldos_cliente").upsert(lote);
          if (error) { setLog("Error al guardar: " + error.message); setProcesando(false); return; }
          insertados += lote.length;
        }

        setLog(
          "✓ Importación completa. " +
          insertados + " clientes con saldo actualizado. " +
          "CUITs en el archivo sin cliente cargado: " + sinMatch + ". " +
          "Omitidos por 'mercap': " + omitidosMercap + ". " +
          (sinCuit ? sinCuit + " filas sin CUIT válido." : "")
        );
        onRefresh();
        setProcesando(false);
        if (fileRef.current) fileRef.current.value = "";
      } catch (err) {
        setLog("Error procesando el archivo: " + err.message);
        setProcesando(false);
      }
    };
    reader.readAsArrayBuffer(file);
  }

  const conSaldo = Object.keys(saldosClienteMap || {}).length;

  return (
    <div className="max-w-xl">
      <h2 className="text-lg font-bold text-slate-800 mb-4">Carga de Saldos</h2>
      <div className="bg-white rounded-xl border border-slate-200 p-5">
        <p className="text-sm text-slate-600 mb-3">
          Subí el <b>Balance de Saldos</b> (Excel exportado del sistema). Se busca cada cliente por <b>CUIT</b>, se consolidan los saldos por CUIT (sumando si aparece más de una vez), se omiten las razones sociales que contienen "mercap", y se calcula el saldo de cuenta corriente: <span className="text-emerald-600 font-medium">verde a favor</span> / <span className="text-rose-600 font-medium">rojo si es deudor</span>.
        </p>
        <p className="text-xs text-amber-700 bg-amber-50 border border-amber-200 rounded-lg p-2 mb-3">
          Cada importación <b>reemplaza por completo</b> los saldos anteriores.
        </p>
        <input type="file" accept=".xlsx,.xls" ref={fileRef} className="hidden" onChange={handleFile} />
        <Button onClick={() => fileRef.current.click()} disabled={procesando}>
          {procesando ? "Procesando..." : "⬆ Subir Balance de Saldos"}
        </Button>
        {conSaldo > 0 && <p className="text-xs text-slate-400 mt-2">Actualmente hay {conSaldo} clientes con saldo cargado.</p>}
        {log && <p className="text-sm text-slate-600 mt-3 bg-slate-50 rounded-lg p-3">{log}</p>}
      </div>
    </div>
  );
}

      </Field>
      <Field label="Rol" required>
        <select className="w-full border border-slate-300 rounded-lg px-3 py-1.5 text-sm" value={rol} onChange={(e) => setRol(e.target.value)}>
          <option value="comercial">Comercial</option>
          <option value="analista_finanzas">Analista Finanzas</option>
        </select>
      </Field>
      <Field label={modal.id ? "Nueva contraseña (dejar vacío para no cambiar)" : "Contraseña"} required={!modal.id}>
        <input type="password" className="w-full border border-slate-300 rounded-lg px-3 py-1.5 text-sm" value={password} onChange={(e) => setPassword(e.target.value)} />
      </Field>
      <div className="flex justify-end gap-2 mt-4">
        <Button variant="secondary" onClick={onCancel}>Cancelar</Button>
        <Button disabled={!nombre.trim() || !username.trim()} onClick={() => onSave({ id: modal.id, nombre_completo: nombre.trim(), username: username.trim(), rol, password })}>Guardar</Button>
      </div>
    </div>
  );
}

/* ============ APP PRINCIPAL ============ */
function App() {
  const [user, setUser] = useState(() => {
    const saved = sessionStorage.getItem("tf_user");
    return saved ? JSON.parse(saved) : null;
  });
  const [tab, setTab] = useState(null);
  const [clientes, setClientes] = useState([]);
  const [cuentas, setCuentas] = useState([]);
  const [saldos, setSaldos] = useState([]);
  const [saldosCliente, setSaldosCliente] = useState([]);
  const [solicitudes, setSolicitudes] = useState([]);
  const [cheques, setCheques] = useState([]);
  const [usuarios, setUsuarios] = useState([]);
  const [loading, setLoading] = useState(true);

  async function loadAll() {
    const [c, cu, sa, sac, so, ch, us] = await Promise.all([
      sb.from("clientes").select("*").order("cliente"),
      sb.from("tf_cuentas_bancarias").select("*"),
      sb.from("tf_saldos").select("*"),
      sb.from("tf_saldos_cliente").select("*"),
      sb.from("tf_solicitudes").select("*"),
      sb.from("tf_solicitud_cheques").select("*"),
      sb.from("usuarios").select("*").order("nombre_completo"),
    ]);
    // Normalizo clientes de logística: columna "cliente" -> "nombre"
    setClientes((c.data || []).map((x) => ({ ...x, nombre: x.cliente })));
    setCuentas(cu.data || []);
    setSaldos(sa.data || []);
    setSaldosCliente(sac.data || []);
    setSolicitudes(so.data || []);
    setCheques(ch.data || []);
    // Normalizo rol de logística: representante -> comercial, analista -> analista_finanzas
    setUsuarios((us.data || []).map((u) => ({
      ...u,
      rol_app: u.rol === "analista" ? "analista_finanzas" : "comercial",
    })));
    setLoading(false);
  }

  useEffect(() => {
    if (user) loadAll();
  }, [user]);

  // Realtime: refresca automáticamente cuando cambian solicitudes o cheques en cualquier navegador
  useEffect(() => {
    if (!user) return;
    const canal = sb
      .channel("tf_cambios")
      .on("postgres_changes", { event: "*", schema: "public", table: "tf_solicitudes" }, () => loadAll())
      .on("postgres_changes", { event: "*", schema: "public", table: "tf_solicitud_cheques" }, () => loadAll())
      .subscribe();
    return () => { sb.removeChannel(canal); };
  }, [user]);

  useEffect(() => {
    if (user && !tab) {
      setTab(user.rol_app === "comercial" ? "nueva" : "panel");
    }
  }, [user]);

  function handleLogin(u) {
    sessionStorage.setItem("tf_user", JSON.stringify(u));
    setUser(u);
  }

  function handleLogout() {
    sessionStorage.removeItem("tf_user");
    setUser(null);
    setTab(null);
  }

  if (!user) return <LoginScreen onLogin={handleLogin} />;
  if (loading) return <div className="min-h-screen flex items-center justify-center text-slate-400">Cargando datos...</div>;

  const saldosMap = Object.fromEntries(saldos.map((s) => [s.cuenta_id, s.saldo]));
  const saldosClienteMap = Object.fromEntries(saldosCliente.map((s) => [s.cliente_id, s.saldo]));

  const tabsComercial = [
    { id: "nueva", label: "Nueva Solicitud" },
    { id: "mis", label: "Mis Solicitudes" },
    { id: "clientes", label: "Mis Clientes" },
  ];
  const tabsAnalista = [
    { id: "panel", label: "Panel Operativo" },
    { id: "abm_cuentas", label: "ABM Cuentas" },
    { id: "saldos", label: "Carga de Saldos" },
  ];
  const tabs = user.rol_app === "comercial" ? tabsComercial : tabsAnalista;

  return (
    <div className="min-h-screen">
      <header className="bg-white border-b border-slate-200 sticky top-0 z-10">
        <div className="max-w-7xl mx-auto px-6 py-3 flex items-center gap-6">
          <div>
            <div className="font-bold text-emerald-700 leading-tight">Intagro SA</div>
            <div className="text-xs text-slate-400 leading-tight">Transferencias y E-cheq</div>
          </div>
          <nav className="flex gap-1 ml-4">
            {tabs.map((t) => (
              <button key={t.id} onClick={() => setTab(t.id)}
                className={"px-3 py-1.5 rounded-lg text-sm font-medium transition " + (tab === t.id ? "bg-emerald-600 text-white" : "text-slate-600 hover:bg-slate-100")}>
                {t.label}
              </button>
            ))}
          </nav>
          <div className="ml-auto flex items-center gap-3">
            <div className="text-right">
              <div className="text-sm font-medium text-slate-700">{user.nombre_completo}</div>
              <div className="text-xs text-slate-400">{user.rol_app === "comercial" ? "Comercial" : "Analista Finanzas"}</div>
            </div>
            <Button variant="secondary" onClick={handleLogout}>Salir</Button>
          </div>
        </div>
      </header>

      <main className="max-w-7xl mx-auto px-6 py-4">
        {tab === "nueva" && (
          <NuevaSolicitud user={user} clientes={clientes} cuentas={cuentas} saldosMap={saldosMap} saldosClienteMap={saldosClienteMap} onCreated={loadAll} />
        )}
        {tab === "mis" && (
          <SolicitudesGrid user={user} role="comercial" solicitudes={solicitudes} cheques={cheques} clientes={clientes} cuentas={cuentas} onRefresh={loadAll} />
        )}
        {tab === "clientes" && (
          <MisClientes user={user} clientes={clientes} cuentas={cuentas} saldosMap={saldosMap} saldosClienteMap={saldosClienteMap} />
        )}
        {tab === "panel" && (
          <SolicitudesGrid user={user} role="analista_finanzas" solicitudes={solicitudes} cheques={cheques} clientes={clientes} cuentas={cuentas} onRefresh={loadAll} />
        )}
        {tab === "abm_cuentas" && (
          <ABMCuentas cuentas={cuentas} clientes={clientes} onRefresh={loadAll} />
        )}
        {tab === "saldos" && (
          <CargaSaldos clientes={clientes} onRefresh={loadAll} saldosClienteMap={saldosClienteMap} />
        )}
      </main>
    </div>
  );
}

function ConfigFaltante() {
  return (
    <div className="min-h-screen flex items-center justify-center p-6">
      <div className="bg-white rounded-2xl shadow max-w-lg p-8 text-center">
        <div className="text-2xl font-bold text-emerald-700 mb-2">Intagro SA — Transferencias y E-cheq</div>
        <p className="text-slate-600 text-sm mb-4">
          Falta configurar las credenciales de Supabase. Abrí este archivo con un editor de texto,
          buscá <code className="bg-slate-100 px-1 rounded">SUPABASE_URL</code> y
          <code className="bg-slate-100 px-1 rounded"> SUPABASE_ANON_KEY</code> cerca del principio,
          y pegá los valores de tu proyecto (Settings → API en Supabase).
        </p>
        <p className="text-xs text-slate-400">Después subí el archivo a GitHub Pages y abrilo desde ahí (no con doble clic).</p>
      </div>
    </div>
  );
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(error) { return { error }; }
  render() {
    if (this.state.error) {
      return (
        <div className="min-h-screen flex items-center justify-center p-6">
          <div className="bg-white rounded-2xl shadow max-w-lg p-8">
            <div className="text-lg font-bold text-rose-600 mb-2">Ocurrió un error</div>
            <pre className="text-xs text-slate-600 whitespace-pre-wrap bg-slate-50 p-3 rounded">{String(this.state.error && this.state.error.message)}</pre>
          </div>
        </div>
      );
    }
    return this.props.children;
  }
}

const rootEl = document.getElementById("root");
ReactDOM.createRoot(rootEl).render(
  <ErrorBoundary>
    {CREDENCIALES_OK ? <App /> : <ConfigFaltante />}
  </ErrorBoundary>
);
</script>
</body>
</html>
